# ServerDash — Nginx reverse proxy configuration
# Place this file in /etc/nginx/sites-available/ and symlink to sites-enabled/

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS reverse proxy → gunicorn/uvicorn on port 8443
server {
    listen 443 ssl;
    server_name _;   # replace with your domain, e.g. serverdash.example.com

    # TLS — replace with your real certificate paths for production
    ssl_certificate     /opt/serverdash/certs/cert.pem;
    ssl_certificate_key /opt/serverdash/certs/key.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Proxy settings
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket upgrade headers (required for /api/scripts/*/run-ws)
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Timeouts — scripts can run for several minutes
    proxy_read_timeout  600s;
    proxy_send_timeout  600s;

    location / {
        proxy_pass https://127.0.0.1:8443;
    }
}
